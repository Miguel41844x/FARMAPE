services:

  # Inventario Database
  mysql-inventario:
    image: mysql:8.4
    container_name: farmape-mysql-inventario
    ports:
      - "${INVENTARIO_MYSQL_PORT:-3307}:3306"
    environment:
      - MYSQL_DATABASE=${INVENTARIO_DB_NAME:-farmape_inventario}
      - MYSQL_USER=${INVENTARIO_DB_USER:-farmape}
      - MYSQL_PASSWORD=${INVENTARIO_DB_PASSWORD:-farmape}
      - MYSQL_ROOT_PASSWORD=${INVENTARIO_DB_ROOT_PASSWORD:-root}
    volumes:
      - mysql-inventario-data:/var/lib/mysql
      - ./database/inventario:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${INVENTARIO_DB_USER:-farmape} -p${INVENTARIO_DB_PASSWORD:-farmape} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Config Server
  config-server:
    build: ./farmape-ms-config
    image: farmape-ms-config
    container_name: farmape-ms-config
    ports:
      - "${CONFIG_SERVER_PORT:-8888}:8888"
    environment:
      - JAVA_OPTS=${JAVA_OPTS:--Xmx300m -Xss512k}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8888/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # Eureka Server
  eureka-server:
    build: ./farmape-ms-eureka
    image: farmape-ms-eureka
    container_name: farmape-ms-eureka
    ports:
      - "${EUREKA_SERVER_PORT:-8761}:8761"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:${CONFIG_SERVER_URL:-http://config-server:8888}
      - EUREKA_INSTANCE_HOSTNAME=eureka-server
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=${EUREKA_SERVER_URL:-http://eureka-server:8761/eureka/}
      - JAVA_OPTS=${JAVA_OPTS:--Xmx300m -Xss512k}
    depends_on:
      - config-server
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8761/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # Inventario Service
  inventario-service:
    build: ./farmape-ms-inventario
    image: farmape-ms-inventario
    container_name: farmape-ms-inventario
    ports:
      - "${INVENTARIO_PORT:-8081}:8081"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:${CONFIG_SERVER_URL:-http://config-server:8888}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=${EUREKA_SERVER_URL:-http://eureka-server:8761/eureka/}
      - SPRING_DATASOURCE_URL=${INVENTARIO_DATASOURCE_URL:-jdbc:mysql://mysql-inventario:3306/farmape_inventario?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
      - SPRING_DATASOURCE_USERNAME=${INVENTARIO_DB_USER:-farmape}
      - SPRING_DATASOURCE_PASSWORD=${INVENTARIO_DB_PASSWORD:-farmape}
      - JAVA_OPTS=${JAVA_OPTS:--Xmx300m -Xss512k}
    depends_on:
      - mysql-inventario
      - config-server
      - eureka-server
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8081/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # API Gateway
  gateway:
    build: ./farmape-ms-gateway
    image: farmape-ms-gateway
    container_name: farmape-ms-gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:${CONFIG_SERVER_URL:-http://config-server:8888}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=${EUREKA_SERVER_URL:-http://eureka-server:8761/eureka/}
      - FRONTEND_LOCAL_ORIGIN=${FRONTEND_LOCAL_ORIGIN:-http://localhost:5173}
      - FRONTEND_ALLOWED_ORIGIN_PATTERN=${FRONTEND_ALLOWED_ORIGIN_PATTERN:-https://*.vercel.app}
      - JAVA_OPTS=${JAVA_OPTS:--Xmx300m -Xss512k}
    depends_on:
      - config-server
      - eureka-server
      - inventario-service
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mysql-inventario-data:
