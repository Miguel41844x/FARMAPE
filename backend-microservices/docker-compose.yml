services:

  # Config Server
  config-server:
    build: ./farmape-ms-config
    image: farmape-ms-config
    container_name: farmape-ms-config
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8888/farmape-ms-eureka/default || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Eureka Server
  eureka-server:
    build: ./farmape-ms-eureka
    image: farmape-ms-eureka
    container_name: farmape-ms-eureka
    ports:
      - "8761:8761"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - EUREKA_INSTANCE_HOSTNAME=eureka-server
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - config-server
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # API Gateway
  gateway:
    build: ./farmape-ms-gateway
    image: farmape-ms-gateway
    container_name: farmape-ms-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - FRONTEND_LOCAL_ORIGIN=http://localhost:5173
    depends_on:
      - config-server
      - eureka-server
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
