server:
  port: 8083

spring:
  application:
    name: farmape-ms-auth
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/farmape_auth}
    username: ${SPRING_DATASOURCE_USERNAME:farmape}
    password: ${SPRING_DATASOURCE_PASSWORD:farmape}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: ${JWT_SECRET:farmape-jwt-secret-clave-minimo-32-caracteres-segura}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}
  bootstrap:
    admin:
      enabled: ${BOOTSTRAP_ADMIN_ENABLED:false}
      usuario: ${BOOTSTRAP_ADMIN_USUARIO:}
      email: ${BOOTSTRAP_ADMIN_EMAIL:}
      clave: ${BOOTSTRAP_ADMIN_CLAVE:}
      dni: ${BOOTSTRAP_ADMIN_DNI:}
      nombres: ${BOOTSTRAP_ADMIN_NOMBRES:Administrador}
      apellidos: ${BOOTSTRAP_ADMIN_APELLIDOS:FARMAPE}

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

info:
  app:
    name: FARMAPE Auth Service
    description: Microservicio de autenticacion y gestion de usuarios de FARMAPE.