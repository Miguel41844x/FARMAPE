server:
  port: 8080

spring:
  application:
    name: farmape-ms-gateway
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - AddRequestHeader=X-Gateway-Request, true
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: inventario
              uri: lb://FARMAPE-MS-INVENTARIO
              predicates:
                - Path=/inventario/**
              filters:
                - RewritePath=/inventario/(?<segment>.*), /api/inventario/${segment}
            - id: inventario-api-legacy
              uri: lb://FARMAPE-MS-INVENTARIO
              predicates:
                - Path=/api/productos,/api/productos/**,/api/categorias,/api/almacen,/api/almacen/**
            - id: inventario-root-legacy
              uri: lb://FARMAPE-MS-INVENTARIO
              predicates:
                - Path=/productos,/productos/**,/categorias,/almacen,/almacen/**
              filters:
                - RewritePath=/(?<segment>.*), /api/${segment}
          globalcors:
            cors-configurations:
              "[/**]":
                allowed-origins:
                  - ${FRONTEND_LOCAL_ORIGIN:http://localhost:5173}
                allowed-origin-patterns:
                  - ${FRONTEND_ALLOWED_ORIGIN_PATTERN:https://*.vercel.app}
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowed-headers:
                  - Authorization
                  - Content-Type
                  - Accept
                  - Origin
                  - X-Requested-With
                exposed-headers:
                  - Authorization

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: false
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

management:
  endpoint:
    health:
      show-details: always

info:
  app:
    name: FARMAPE API Gateway
    description: Punto de entrada HTTP para el frontend de FARMAPE.
