apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: auth-service
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: auth-service
  template:
    metadata:
      labels:
        io.kompose.service: auth-service
    spec:
      initContainers:
        - name: wait-for-services
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z -w 2 config-server 8888 && nc -z -w 2 eureka-server 8761 && nc -z -w 2 postgres-auth 5432; do
                echo "Waiting for config-server, eureka-server and postgres-auth..."
                sleep 2
              done
        - name: wait-for-auth-schema
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-auth-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-auth-secret
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-auth-secret
                  key: POSTGRES_PASSWORD
          command:
            - sh
            - -c
            - |
              until psql -h postgres-auth -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "SELECT 1 FROM cuentas_usuario LIMIT 1"; do
                echo "Waiting for farmape_auth schema..."
                sleep 3
              done
      containers:
        - image: farmape-ms-auth
          imagePullPolicy: IfNotPresent
          name: auth-service
          env:
            - name: SPRING_CONFIG_IMPORT
              value: optional:configserver:http://config-server:8888
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres-auth:5432/farmape_auth
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-auth-secret
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-auth-secret
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: postgres-auth-secret
                  key: JWT_SECRET
            - name: JWT_EXPIRATION_MINUTES
              value: "120"
            - name: JWT_REFRESH_EXPIRATION_DAYS
              value: "7"
            - name: BOOTSTRAP_ADMIN_ENABLED
              value: "false"
            - name: JAVA_OPTS
              value: -Xmx300m -Xss512k
          ports:
            - containerPort: 8083
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
      restartPolicy: Always
