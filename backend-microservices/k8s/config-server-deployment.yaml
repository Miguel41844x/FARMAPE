apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: config-server
  name: config-server
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: config-server
  template:
    metadata:
      labels:
        io.kompose.service: config-server
    spec:
      containers:
        - image: farmape-ms-config
          imagePullPolicy: IfNotPresent
          name: config-server
          env:
            - name: JAVA_OPTS
              value: -Xmx300m -Xss512k
          ports:
            - containerPort: 8888
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8888
            failureThreshold: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8888
            failureThreshold: 10
            periodSeconds: 10
            timeoutSeconds: 5
      restartPolicy: Always
