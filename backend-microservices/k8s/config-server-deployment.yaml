apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: config-server
  name: config-server
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: config-server
  template:
    metadata:
      labels:
        io.kompose.service: config-server
    spec:
      containers:
        - image: farmape-ms-config
          imagePullPolicy: IfNotPresent
          name: config-server
          ports:
            - containerPort: 8888
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - wget --no-verbose --tries=1 --spider http://localhost:8888/farmape-ms-eureka/default || exit 1
            failureThreshold: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - wget --no-verbose --tries=1 --spider http://localhost:8888/farmape-ms-eureka/default || exit 1
            failureThreshold: 10
            periodSeconds: 10
            timeoutSeconds: 5
      restartPolicy: Always
