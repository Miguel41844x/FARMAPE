apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: inventario-service
  name: inventario-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: inventario-service
  template:
    metadata:
      labels:
        io.kompose.service: inventario-service
    spec:
      initContainers:
        - name: wait-for-services
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z -w 2 config-server 8888 && nc -z -w 2 eureka-server 8761 && nc -z -w 2 mysql-inventario 3306; do
                echo "Waiting for config-server, eureka-server and mysql-inventario..."
                sleep 2
              done
        - name: wait-for-inventario-schema
          image: mysql:8.4
          env:
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-inventario-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-inventario-secret
                  key: MYSQL_PASSWORD
          command:
            - sh
            - -c
            - |
              until mysql -h mysql-inventario -u$MYSQL_USER -p$MYSQL_PASSWORD -D farmape_inventario -e "SELECT 1 FROM productos LIMIT 1"; do
                echo "Waiting for farmape_inventario schema..."
                sleep 3
              done
      containers:
        - image: farmape-ms-inventario
          imagePullPolicy: IfNotPresent
          name: inventario-service
          env:
            - name: SPRING_CONFIG_IMPORT
              value: optional:configserver:http://config-server:8888
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql-inventario:3306/farmape_inventario?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-inventario-secret
                  key: MYSQL_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-inventario-secret
                  key: MYSQL_PASSWORD
            - name: JAVA_OPTS
              value: -Xmx300m -Xss512k
          ports:
            - containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
      restartPolicy: Always
