apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    io.kompose.service: mysql-inventario
  name: mysql-inventario-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: mysql-inventario
  name: mysql-inventario
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: mysql-inventario
  template:
    metadata:
      labels:
        io.kompose.service: mysql-inventario
    spec:
      containers:
        - image: mysql:8.4
          imagePullPolicy: IfNotPresent
          name: mysql-inventario
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-inventario-secret
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-inventario-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-inventario-secret
                  key: MYSQL_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-inventario-secret
                  key: MYSQL_ROOT_PASSWORD
          ports:
            - containerPort: 3306
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h localhost -u$MYSQL_USER -p$MYSQL_PASSWORD --silent
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h localhost -u$MYSQL_USER -p$MYSQL_PASSWORD --silent
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          volumeMounts:
            - mountPath: /var/lib/mysql
              name: mysql-inventario-data
            - mountPath: /docker-entrypoint-initdb.d
              name: inventario-sql-init
              readOnly: true
      restartPolicy: Always
      volumes:
        - name: mysql-inventario-data
          persistentVolumeClaim:
            claimName: mysql-inventario-data
        - name: inventario-sql-init
          configMap:
            name: inventario-sql-init
