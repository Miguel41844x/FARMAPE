apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: ventas-service
  name: ventas-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: ventas-service
  template:
    metadata:
      labels:
        io.kompose.service: ventas-service
    spec:
      initContainers:
        - name: wait-for-services
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z -w 2 config-server 8888 && nc -z -w 2 eureka-server 8761 && nc -z -w 2 mongo-ventas 27017 && nc -z -w 2 inventario-service 8081; do
                echo "Waiting for config-server, eureka-server, mongo-ventas and inventario-service..."
                sleep 2
              done
        - name: wait-for-ventas-data
          image: mongo:7
          command:
            - sh
            - -c
            - |
              until mongosh "mongodb://mongo-ventas:27017/farmape_ventas" --quiet --eval 'db.getCollectionNames().indexOf("ordenes_venta") >= 0 && db.getCollectionNames().indexOf("clientes") >= 0' | grep true; do
                echo "Waiting for farmape_ventas collections..."
                sleep 3
              done
      containers:
        - image: farmape-ms-ventas
          imagePullPolicy: IfNotPresent
          name: ventas-service
          env:
            - name: SPRING_CONFIG_IMPORT
              value: optional:configserver:http://config-server:8888
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
            - name: SPRING_MONGODB_URI
              value: mongodb://mongo-ventas:27017/farmape_ventas
            - name: SPRING_MONGODB_DATABASE
              value: farmape_ventas
            - name: SPRING_DATA_MONGODB_URI
              value: mongodb://mongo-ventas:27017/farmape_ventas
            - name: SPRING_DATA_MONGODB_DATABASE
              value: farmape_ventas
            - name: JAVA_OPTS
              value: -Xmx300m -Xss512k
          ports:
            - containerPort: 8082
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
      restartPolicy: Always
